name: MacOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: brew install cmake pkg-config openssl

    - name: Configure
      run: cmake -B build

    - name: Build
      run: cmake --build build -j"$(sysctl -n hw.ncpu)"
